<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TShop - Güvenli Giriş</title>
    <!-- Tailwind CSS (Tasarım için) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Telegram WebApp Kütüphanesi -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @keyframes pulse-bg {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.4; }
        }
        .bg-glow { animation: pulse-bg 8s infinite ease-in-out; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden font-sans">

    <!-- Arka Plan Işığı -->
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-blue-900/40 via-slate-950 to-slate-950 pointer-events-none z-0"></div>
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[500px] h-[500px] bg-blue-500/10 blur-[120px] rounded-full bg-glow z-0"></div>

    <!-- Giriş Kartı -->
    <div class="max-w-md w-full bg-slate-900/60 backdrop-blur-xl border border-slate-800 p-8 rounded-3xl shadow-2xl z-10 text-center relative">
        
        <!-- Logo Alanı -->
        <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl mx-auto flex items-center justify-center text-white shadow-xl shadow-blue-500/20 mb-6">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>

        <h1 class="text-3xl font-bold text-white tracking-tight mb-2">TShop v4.0</h1>
        <p class="text-sm text-slate-400 mb-8">Devam etmek için Telegram hesabınızla kimliğinizi doğrulayın.</p>

        <!-- Durum Bildirimleri (Hata veya Başarı Mesajı için) -->
        <div id="status-box" class="hidden mb-4 p-3 rounded-xl text-sm border font-medium"></div>

        <!-- Telegram Giriş Butonu -->
        <button id="tg-login-btn" class="w-full bg-[#24A1DE] hover:bg-[#1e8bc2] text-white font-semibold py-3.5 px-6 rounded-xl shadow-lg shadow-blue-500/10 transition-all duration-200 active:scale-[0.98] flex items-center justify-center gap-3">
            <!-- Telegram İkonu -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 11.944 0zm4.962 7.224c.1-.002.321.023.465.14.506.506.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
            Telegram ile Giriş Yap
        </button>

        <!-- Yükleniyor Durumu -->
        <div id="loading-spinner" class="hidden mx-auto w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mt-4"></div>

    </div>

    <!-- JavaScript Mekanizması -->
    <script>
        const loginBtn = document.getElementById('tg-login-btn');
        const statusBox = document.getElementById('status-box');
        const spinner = document.getElementById('loading-spinner');

        function showMessage(msg, type) {
            statusBox.classList.remove('hidden', 'bg-emerald-500/10', 'text-emerald-400', 'border-emerald-500/20', 'bg-red-500/10', 'text-red-400', 'border-red-500/20');
            if (type === 'success') {
                statusBox.classList.add('bg-emerald-500/10', 'text-emerald-400', 'border-emerald-500/20');
            } else {
                statusBox.classList.add('bg-red-500/10', 'text-red-400', 'border-red-500/20');
            }
            statusBox.innerText = msg;
        }

        loginBtn.addEventListener('click', async () => {
            // Telegram WebApp penceresinden gelen verileri yakalıyoruz
            const tg = window?.Telegram?.WebApp;
            
            if (!tg || !tg.initDataUnsafe?.user) {
                showMessage("Hata: Bu siteye doğrudan tarayıcıdan değil, Telegram Botu içerisinden (Mini App olarak) girmeniz gerekir!", "error");
                return;
            }

            loginBtn.style.display = 'none';
            spinner.classList.remove('hidden');

            // Telegram'ın bize verdiği mühürlü paket (Zarf)
            const rawInitData = tg.initData; 
            
            try {
                // Vercel'de birazdan açacağımız arka odaya (API) veriyi doğrulamaya gönderiyoruz
                const response = await fetch('/api/auth/telegram', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: rawInitData }),
                });

                const result = await response.json();

                spinner.classList.add('hidden');

                if (response.ok && result.success) {
                    showMessage(`Giriş Başarılı! Hoş geldin, ${result.user.username}. Yönetici Onayı Verildi.`, "success");
                    // Sistem doğrulandı, ileride buraya ana sayfaya yönlendirme kodu ekleyeceğiz.
                    if (tg.expand) tg.expand(); // Ekranı tam boyuta getirir
                } else {
                    loginBtn.style.display = 'flex';
                    showMessage(result.error || "Doğrulama başarısız oldu.", "error");
                }
            } catch (err) {
                loginBtn.style.display = 'flex';
                spinner.classList.add('hidden');
                showMessage("Sunucu bağlantı hatası oluştu.", "error");
            }
        });
    </script>
</body>
</html>
